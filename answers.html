<!DOCTYPE html>
<html>
<head>
<title>Your Answers</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f2f5; padding:20px; }
h1,h2 { text-align:center; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
button { padding:10px 20px; border:none; border-radius:5px; background:#0072ff; color:#fff; cursor:pointer; margin-top:10px; }
button:hover { opacity:0.9; }
p { margin:8px 0; }
</style>
</head>
<body>

<h1>Your Submitted Answers</h1>
<div class="container" id="answersContainer"></div>
<div style="text-align:center;">
<button onclick="downloadPDF()">Download as PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const data = JSON.parse(localStorage.getItem("examSubmission"));
const container = document.getElementById("answersContainer");
if(data){
    let html = `<h2>${data.name}</h2><p><b>School:</b> ${data.school}</p><p><b>Class:</b> ${data.class}</p><hr>`;
    data.answers.forEach(a=>{ html += `<p><b>${a.q}:</b> ${a.ans}</p>`; });
    container.innerHTML = html;
} else {
    container.innerHTML = "<p>No submission found.</p>";
}

function downloadPDF(){
    if(!data) return;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    let content = `Name: ${data.name}\nSchool: ${data.school}\nClass: ${data.class}\n\n`;
    data.answers.forEach(a=> content += `${a.q}: ${a.ans}\n\n`);
    pdf.text(content, 10, 10);
    pdf.save(`${data.name}_Exam.pdf`);
}
</script>

</body>
</html>
