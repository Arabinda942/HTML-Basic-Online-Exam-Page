<!DOCTYPE html>
<html>
<head>
<title>Answers</title>
<style>
body { font-family: Arial; padding:20px; }
.box { background:#f5f5f5; padding:15px; margin-bottom:10px; }
</style>
</head>
<body>

<h1>Result</h1>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Class:</b> <span id="class"></span></p>

<div id="answers"></div>

<h2>Total Marks: <span id="total"></span></h2>

<script>
const urlParams = new URLSearchParams(window.location.search);

const name = urlParams.get("studentNameField");
const className = urlParams.get("className");

document.getElementById("name").textContent = name;
document.getElementById("class").textContent = className;

let total = 0;
const container = document.getElementById("answers");

for(let i=0;i<50;i++){
    const ans = urlParams.get("q"+i);
    if(ans){
        container.innerHTML += `<div class="box">Q${i+1}: ${ans}</div>`;
        total += 2;
    }
}

document.getElementById("total").textContent = total;

// SAVE
let data = JSON.parse(localStorage.getItem("examResults")) || [];

data.push({
    name,
    class: className,
    total,
    date: new Date().toLocaleString()
});

localStorage.setItem("examResults", JSON.stringify(data));
</script>

</body>
</html>
