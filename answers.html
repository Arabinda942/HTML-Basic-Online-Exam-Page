<!DOCTYPE html>
<html>
<head>
<title>Submission Summary</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    padding:30px;
}

.container {
    max-width:800px;
    margin:auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:15px;
}

h1 { text-align:center; margin-bottom:20px; }

.box {
    background: rgba(255,255,255,0.1);
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Submission Summary</h1>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Class:</b> <span id="class"></span></p>
<p><b>School:</b> <span id="school"></span></p>

<br>

<div id="answers"></div>

</div>

<script>

const studentInfo = JSON.parse(localStorage.getItem("studentInfo")) || {};

const name = studentInfo.name || "Unknown";
const className = studentInfo.className || "Unknown";
const school = studentInfo.school || "Unknown";

document.getElementById("name").textContent = name;
document.getElementById("class").textContent = className;
document.getElementById("school").textContent = school;

const urlParams = new URLSearchParams(window.location.search);

let answers = [];
const container = document.getElementById("answers");

for(let i=1;i<=35;i++){
    const ans = urlParams.get("q"+i);
    if(ans){
        answers.push({q:i, ans});
        container.innerHTML += `<div class="box">Q${i}: ${ans}</div>`;
    }
}

let data = JSON.parse(localStorage.getItem("examResults")) || [];

data.push({
    name,
    class: className,
    school,
    answers,
    total: "",
    date: new Date().toLocaleString()
});

localStorage.setItem("examResults", JSON.stringify(data));

</script>

</body>
</html>
