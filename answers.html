<!DOCTYPE html>
<html>
<head>
<title>Submitted Answers</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
table { width:100%; border-collapse:collapse; background:#fff; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#0072ff; color:#fff; }
a { color:#0072ff; text-decoration:none; }
a:hover { text-decoration:underline; }
#search { margin-bottom:10px; padding:8px; width:50%; border-radius:5px; border:1px solid #ccc; }
</style>
</head>
<body>

<h1>Submitted Answers</h1>

<input id="search" placeholder="Search by student name..." oninput="filterTable()">

<table>
<thead>
<tr>
<th>Name</th>
<th>School/College</th>
<th>Class/Sem</th>
<th>Answers</th>
<th>Scan</th>
<th>Date</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
function load(){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const table = document.getElementById("data");
    table.innerHTML = "";
    data.forEach((s,index)=>{
        let ansHTML = "";
        if(s.answers && s.answers.length){
            s.answers.forEach(a=> ansHTML += `Q${a.q}: ${a.ans}<br>`);
        } else ansHTML = "No answers";
        table.innerHTML += `<tr>
            <td>${s.name}</td>
            <td>${s.school}</td>
            <td>${s.class}</td>
            <td>${ansHTML}</td>
            <td>${s.file ? `<a href="${s.file}" target="_blank">Open</a>` : "No File"}</td>
            <td>${s.date}</td>
        </tr>`;
    });
}

function filterTable(){
    const term = document.getElementById("search").value.toLowerCase();
    const rows = document.querySelectorAll("#data tr");
    rows.forEach(r=>{
        const name = r.cells[0].innerText.toLowerCase();
        r.style.display = name.includes(term) ? "" : "none";
    });
}

load();
</script>

</body>
</html>
