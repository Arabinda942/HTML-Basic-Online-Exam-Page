<!DOCTYPE html>
<html>
<head>
<title>Exam Answers</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
.answer-box { background:#fff; padding:15px; margin-bottom:15px; border-radius:8px; box-shadow:1px 1px 5px #ccc; }
.answer-box h3 { margin-top:0; }
button { padding:8px 15px; border:none; border-radius:5px; background:#0072ff; color:#fff; cursor:pointer; }
button:hover { opacity:0.9; }
</style>
</head>
<body>

<h1>Your Submitted Answers</h1>
<div id="answersContainer"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// Firebase config (replace with your own)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function fetchAnswers() {
    const container = document.getElementById("answersContainer");
    const name = prompt("Enter your full name to view your answers:");
    if(!name) return;

    db.ref("examResults").orderByChild("name").equalTo(name).once("value", snapshot => {
        container.innerHTML = "";
        if(snapshot.exists()){
            snapshot.forEach(snap => {
                const data = snap.val();
                const div = document.createElement("div");
                div.className = "answer-box";
                div.innerHTML = `<h3>${data.name} - ${data.school} (${data.class})</h3>
                                 <p><strong>Date:</strong> ${data.date}</p>
                                 ${data.answers.map(a=>`<p><strong>${a.q}:</strong> ${a.ans}</p>`).join('')}
                                 ${data.file ? `<p><a href="${data.file}" target="_blank">Uploaded File</a></p>` : ''}`;
                container.appendChild(div);
            });
        } else {
            container.innerHTML = "<p>No submissions found with this name.</p>";
        }
    });
}

fetchAnswers();
</script>
</body>
</html>
