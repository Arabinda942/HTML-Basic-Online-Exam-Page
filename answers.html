<!DOCTYPE html>
<html>
<head>
<title>View Exam Answers</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f0f2f5; }
h1 { text-align:center; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:#fff; color:#000; border-radius:10px; overflow:hidden; }
th, td { padding:10px; border:1px solid #ccc; text-align:center; }
th { background:#0072ff; color:#fff; }
button { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>

<h1>Submitted Exam Answers</h1>

<table>
<thead>
<tr>
<th>Name</th>
<th>School</th>
<th>Class</th>
<th>Date</th>
<th>View Answers</th>
<th>File</th>
</tr>
</thead>
<tbody id="answersTable"></tbody>
</table>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
<div style="background:#fff; color:#000; padding:20px; width:90%; max-width:800px; max-height:90%; overflow:auto; border-radius:10px;">
<button onclick="closeModal()">Close</button>
<div id="answerView"></div>
</div>
</div>

<script>
function loadAnswers(){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const tbody = document.getElementById("answersTable");
    tbody.innerHTML = "";
    data.forEach((s,i)=>{
        tbody.innerHTML += `<tr>
            <td>${s.name}</td>
            <td>${s.school}</td>
            <td>${s.class}</td>
            <td>${s.date}</td>
            <td><button onclick="viewAnswers(${i})">View</button></td>
            <td>${s.file ? `<a href="${s.file}" target="_blank">Open</a>` : "No File"}</td>
        </tr>`;
    });
}

function viewAnswers(i){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const s = data[i];
    let html = `<h2>${s.name}</h2><p><b>Class:</b> ${s.class}</p><p><b>School:</b> ${s.school}</p><hr>`;
    s.answers.forEach(a=>{
        html += `<p><b>${a.q}:</b> ${a.ans}</p>`;
    });
    document.getElementById("answerView").innerHTML = html;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){ document.getElementById("modal").style.display="none"; }

window.onload = loadAnswers;
</script>

</body>
</html>
