<!DOCTYPE html>
<html>
<head>
    <title>HTML Basic Exam</title>

    <style>
        body { 
            font-family: Arial; 
            background:#f5f5f5; 
            margin:20px; 
            margin-top:100px;
        }

        h1,h2 { text-align:center; }

        .section { 
            background:#fff; 
            padding:20px; 
            margin-bottom:20px; 
            border-radius:8px; 
            box-shadow:1px 1px 5px #ccc; 
        }

        .question { margin-bottom:15px; }

        textarea { width:100%; padding:5px; }

        button { padding:10px 15px; }

        /* HEADER */
        .exam-header {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            background: rgba(0,0,0,0.85);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 20px;
            z-index:1000;
        }

        .student-info {
            font-size:14px;
        }

        .student-info div {
            margin-bottom:3px;
        }

        .timer-center {
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            font-size:20px;
            font-weight:bold;
            color:#00ffcc;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="exam-header">

    <div class="student-info">
        <div><b>Name - </b><span id="showName"></span></div>
        <div><b>School / College Name - </b><span id="showSchool"></span></div>
        <div><b>Class / Semester - </b><span id="showClass"></span></div>
    </div>

    <div class="timer-center" id="timer">Time Left: 120:00</div>

</div>

<h1>HTML Basic Exam</h1>

<form id="examForm" action="answers.html" method="get">

<div class="section">
    <h2>Section A</h2>

    <div class="question">
        <p>1. What is HTML?</p>
        <input type="radio" name="q1" value="HyperText Markup Language"> HyperText Markup Language<br>
        <input type="radio" name="q1" value="Wrong"> Wrong
    </div>

    <div class="question">
        <p>2. What does HTML stand for?</p>
        <input type="radio" name="q2" value="HyperText Markup Language"> HyperText Markup Language<br>
        <input type="radio" name="q2" value="Wrong"> Wrong
    </div>

</div>

<div class="section">
    <h2>Section B</h2>

    <textarea name="q11" rows="5"></textarea>
</div>

<div style="text-align:center;">
    <button type="submit">Submit</button>
</div>

</form>

<script>

// LOAD STUDENT DATA
const studentInfo = JSON.parse(localStorage.getItem("studentInfo")) || {};

document.getElementById("showName").textContent = studentInfo.name || "Unknown";
document.getElementById("showSchool").textContent = studentInfo.school || "Unknown";
document.getElementById("showClass").textContent = studentInfo.className || "Unknown";


// TIMER (CENTER)
let totalSeconds = 120 * 60;

const timerElement = document.getElementById("timer");

let countdown = setInterval(function(){

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    timerElement.textContent = `Time Left: ${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;

    totalSeconds--;

    if(totalSeconds < 0){
        clearInterval(countdown);
        alert("Time is up! Submitting exam...");
        document.getElementById("examForm").submit();
    }

}, 1000);

</script>

</body>
</html>
