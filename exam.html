<!DOCTYPE html>
<html>
<head>
<title>Exam</title>
<style>
body { font-family: Arial; margin:20px; }
.question { margin-bottom:15px; }
textarea { width:100%; }
</style>
</head>
<body>

<h1>Loading...</h1>

<form id="examForm" action="answers.html" method="get">

<input type="text" name="studentNameField" placeholder="Enter Name" required>
<input type="hidden" name="className" id="className">

<div id="questionsContainer"></div>

<button type="submit">Submit</button>
</form>

<script>
const urlParams = new URLSearchParams(window.location.search);
const paperFile = urlParams.get("paper");
const className = urlParams.get("className");

document.getElementById("className").value = className;

fetch(paperFile)
.then(res => res.json())
.then(data => {
    document.querySelector("h1").textContent = data.title;

    const container = document.getElementById("questionsContainer");

    data.questions.forEach((q, index) => {
        let html = `<div class="question"><p>${index+1}. ${q.question}</p>`;

        if(q.type === "mcq"){
            q.options.forEach(opt => {
                html += `<input type="radio" name="q${index}" value="${opt}"> ${opt}<br>`;
            });
        }

        if(q.type === "text" || q.type === "code"){
            html += `<textarea name="q${index}" rows="4"></textarea>`;
        }

        html += `</div>`;
        container.innerHTML += html;
    });
});
</script>

</body>
</html>
