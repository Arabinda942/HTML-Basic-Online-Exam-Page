<!DOCTYPE html>
<html>
<head>
    <title>Examination Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }

        .container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            background: rgba(255,255,255,0.15);
            color:#fff;
        }

        input::placeholder { color:#ddd; }

        button {
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background: linear-gradient(135deg,#00c6ff,#0072ff);
            color:#fff;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Examination Portal</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="school" placeholder="School / College">
<input type="text" id="class" placeholder="Class / Semester">

<button onclick="startExam()">Start Exam</button>

</div>

<script>
function startExam(){

    const name = document.getElementById("name").value.trim();
    const school = document.getElementById("school").value.trim();
    const className = document.getElementById("class").value.trim();

    if(name==="" || school==="" || className===""){
        alert("Please fill all fields");
        return;
    }

    // ✅ SAVE in localStorage (IMPORTANT)
    localStorage.setItem("studentInfo", JSON.stringify({
        name: name,
        school: school,
        className: className
    }));

    // redirect to exam
    window.location.href = "exam.html";
}
</script>

</body>
</html>
