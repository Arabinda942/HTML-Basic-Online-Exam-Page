    <title>Exam Portal</title>
    <style>
        body {
            font-family: Arial;
            background:#222;
            color:#fff;
            text-align:center;
            padding:40px;
        }
        h1 { margin-bottom:30px; }

        .grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
            gap:20px;
        }

        .card {
            background:#444;
            padding:20px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover {
            background:#666;
            transform:scale(1.05);
        }

        a {
            text-decoration:none;
            color:#fff;
            font-size:18px;
        }
    </style>
</head>
