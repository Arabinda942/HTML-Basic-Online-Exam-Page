<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    padding:30px;
}

h1 { text-align:center; margin-bottom:20px; }

.login-box, .panel {
    max-width:900px;
    margin:auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:25px;
    border-radius:15px;
}

input {
    padding:10px;
    margin:10px;
    border:none;
    border-radius:6px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.table-container {
    overflow-x:auto;
    margin-top:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.2);
    text-align:center;
}

.hidden { display:none; }

a { color:#00c6ff; }
</style>
</head>

<body>

<h1>Admin Panel</h1>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
    <input id="id" placeholder="Admin ID">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="err"></p>
</div>

<!-- PANEL -->
<div id="panel" class="panel hidden">

<button onclick="logout()">Logout</button>
<button onclick="clearData()">Clear All</button>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>School</th>
<th>Answers</th>
<th>Scan</th>
<th>Marks</th>
<th>Date</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<script>

// LOGIN
function login(){
    const user = id.value;
    const passw = pass.value;

    if(user==="Arabinda" && passw==="shamballa"){
        loginBox.classList.add("hidden");
        panel.classList.remove("hidden");
        load();
    } else {
        err.textContent="Wrong credentials";
    }
}

// LOAD DATA
function load(){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const table = document.getElementById("data");
    table.innerHTML="";

    data.forEach((s,index)=>{
        const row = `
        <tr>
            <td>${s.name}</td>
            <td>${s.class}</td>
            <td>${s.school || "-"}</td>

            <td><button onclick="viewAnswers(${index})">View</button></td>

            <td>${s.file ? `<a href="${s.file}" target="_blank">Open</a>` : "No File"}</td>

            <td>
                <input type="number" value="${s.marks}" 
                onchange="saveMarks(${index}, this.value)">
            </td>

            <td>${s.date}</td>
        </tr>
        `;
        table.innerHTML += row;
    });
}

// VIEW ANSWERS
function viewAnswers(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];

    let text = `Answers of ${student.name}\n\n`;

    student.answers.forEach(a=>{
        text += `Q${a.q}: ${a.ans}\n\n`;
    });

    alert(text);
}

// SAVE MARKS
function saveMarks(i, marks){
    let data = JSON.parse(localStorage.getItem("examResults"));
    data[i].marks = marks;
    localStorage.setItem("examResults", JSON.stringify(data));
}

// CLEAR
function clearData(){
    if(confirm("Delete all records?")){
        localStorage.removeItem("examResults");
        load();
    }
}

// LOGOUT
function logout(){
    panel.classList.add("hidden");
    loginBox.classList.remove("hidden");
}

</script>

</body>
</html>
