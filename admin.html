<!DOCTYPE html>
<html>
<head>
<title>Admin & Student Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body { background: linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; padding:30px; }
h1 { text-align:center; margin-bottom:20px; }
#login, #studentView { max-width:300px; margin:50px auto; background: rgba(255,255,255,0.1); padding:25px; border-radius:10px; text-align:center; }
#login input, #studentView input { width:100%; padding:10px; margin:10px 0; border:none; border-radius:5px; }
#login button, #studentView button { padding:10px; width:100%; background:#00c6ff; border:none; color:#fff; border-radius:5px; cursor:pointer; }
.hidden { display:none; }
#panel { background: rgba(255,255,255,0.08); padding:20px; border-radius:15px; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:#fff; color:#000; border-radius:10px; overflow:hidden; }
th { background:#0072ff; color:#fff; }
td, th { padding:10px; border:1px solid #ccc; text-align:center; }
button { padding:6px 10px; border:none; border-radius:5px; cursor:pointer; margin:2px; }
button:hover { opacity:0.9; }
input[type="number"] { width:70px; padding:5px; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; overflow:auto; }
.modal-content { background:#fff; color:#000; padding:20px; width:90%; max-width:800px; max-height:90%; overflow:auto; border-radius:10px; }
#search { margin-bottom:10px; padding:8px; width:50%; border-radius:5px; border:none; }
</style>
</head>
<body>

<h1>Admin & Student Panel</h1>

<!-- ADMIN LOGIN -->
<div id="login">
<input id="adminId" placeholder="Admin ID">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err" style="color:red;"></p>
</div>

<!-- STUDENT VIEW -->
<div id="studentView">
<input id="studentName" placeholder="Enter your name to see your answers">
<button onclick="viewStudentAnswers()">View Answers</button>
<p id="studentMsg" style="color:lightgreen;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="panel" class="hidden">
<button onclick="logout()">Logout</button>
<button onclick="clearAll()" style="background:red; color:white; margin-bottom:10px;">Clear All Records</button>
<input id="search" placeholder="Search by student name..." oninput="filterTable()">

<table>
<thead>
<tr>
<th>Name</th>
<th>School/College</th>    
<th>Class/Sem</th>
<th>Total</th>
<th>Answers</th>
<th>Scan</th>
<th>Date</th>
<th>Download</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
    <button onclick="closeModal()">Close</button>
    <div id="answerView"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ---------- ADMIN LOGIN ----------
function login(){
    const user = document.getElementById("adminId").value.trim();
    const pass = document.getElementById("adminPass").value.trim();
    if(user==="Arabinda" && pass==="shamballa"){
        document.getElementById("login").style.display="none";
        document.getElementById("panel").classList.remove("hidden");
        load();
    } else {
        document.getElementById("err").textContent="Wrong login";
    }
}

// ---------- LOAD DATA ----------
function load(){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const table = document.getElementById("data");
    table.innerHTML = "";
    data.forEach((s,index)=>{
        table.innerHTML += `
        <tr>
        <td contenteditable="true" onblur="updateField(${index}, 'name', this.innerText)">${s.name}</td>
        <td contenteditable="true" onblur="updateField(${index}, 'school', this.innerText)">${s.school}</td>
        <td contenteditable="true" onblur="updateField(${index}, 'class', this.innerText)">${s.class}</td>
        <td contenteditable="true" onblur="updateField(${index}, 'total', this.innerText)">${s.total || ""}</td>
        <td><button onclick="viewAnswers(${index})">View</button></td>
        <td>${s.file ? `<a href="${s.file}" target="_blank">Open</a>` : "No File"}</td>
        <td>${s.date}</td>
        <td>
            <button onclick="downloadPDF(${index})">PDF</button>
            <button onclick="downloadDOC(${index})">Word</button>
        </td>
        <td><button onclick="deleteRecord(${index})">Delete</button></td>
        </tr>
        `;
    });
}

// ---------- FILTER TABLE ----------
function filterTable(){
    const term = document.getElementById("search").value.toLowerCase();
    const rows = document.querySelectorAll("#data tr");
    rows.forEach(r=>{
        const name = r.cells[0].innerText.toLowerCase();
        r.style.display = name.includes(term) ? "" : "none";
    });
}

// ---------- VIEW ANSWERS ----------
function viewAnswers(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];
    let html = `<h2>${student.name}</h2>`;
    html += `<p><b>Class:</b> ${student.class}</p>`;
    html += `<p><b>School:</b> ${student.school}</p><hr>`;
    if(student.answers && student.answers.length){
        student.answers.forEach(a=>{
            html += `<p><b>Q${a.q}:</b> ${a.ans}</p>`;
        });
    } else {
        html += "<p>No answers found</p>";
    }
    document.getElementById("answerView").innerHTML = html;
    document.getElementById("modal").style.display = "flex";
}

// ---------- STUDENT VIEW ----------
function viewStudentAnswers(){
    const name = document.getElementById("studentName").value.trim();
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const student = data.find(s=>s.name.toLowerCase()===name.toLowerCase());
    const msg = document.getElementById("studentMsg");
    if(student){
        let html = `<h2>${student.name}</h2>`;
        html += `<p><b>Class:</b> ${student.class}</p>`;
        html += `<p><b>School:</b> ${student.school}</p><hr>`;
        if(student.answers && student.answers.length){
            student.answers.forEach(a=>{
                html += `<p><b>Q${a.q}:</b> ${a.ans}</p>`;
            });
        } else html += "<p>No answers found</p>";
        document.getElementById("answerView").innerHTML = html;
        document.getElementById("modal").style.display = "flex";
        msg.textContent="";
    } else {
        msg.textContent = "No submission found with this name.";
    }
}

// ---------- CLOSE MODAL ----------
function closeModal(){ document.getElementById("modal").style.display="none"; }

// ---------- UPDATE FIELD ----------
function updateField(i, field, value){
    let data = JSON.parse(localStorage.getItem("examResults")) || [];
    data[i][field] = value.trim();
    localStorage.setItem("examResults", JSON.stringify(data));
}

// ---------- DELETE ----------
function deleteRecord(i){
    if(confirm("Delete this record?")){
        let data = JSON.parse(localStorage.getItem("examResults")) || [];
        data.splice(i,1);
        localStorage.setItem("examResults", JSON.stringify(data));
        load();
    }
}

// ---------- CLEAR ALL ----------
function clearAll(){
    if(confirm("Delete ALL records?")){
        localStorage.removeItem("examResults");
        load();
    }
}

// ---------- PDF DOWNLOAD ----------
function downloadPDF(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];
    let content = `Name: ${student.name}\nClass: ${student.class}\nSchool: ${student.school}\n\n`;
    if(student.answers) student.answers.forEach(a=>content += `Q${a.q}: ${a.ans}\n\n`);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.text(content, 10, 10);
    pdf.save(`${student.name}_Exam.pdf`);
}

// ---------- WORD DOWNLOAD ----------
function downloadDOC(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];
    let content = `Name: ${student.name}\nClass: ${student.class}\nSchool: ${student.school}\n\n`;
    if(student.answers) student.answers.forEach(a=>content += `Q${a.q}: ${a.ans}\n\n`);
    const blob = new Blob([content], { type: "application/msword" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${student.name}_Exam.doc`;
    link.click();
}

// ---------- LOGOUT ----------
function logout(){
    document.getElementById("panel").classList.add("hidden");
    document.getElementById("login").style.display="block";
}
</script>
</body>
</html>
