<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    padding:30px;
}

h1 {
    text-align:center;
    margin-bottom:20px;
}

#login {
    max-width:300px;
    margin:50px auto;
    background: rgba(255,255,255,0.1);
    padding:25px;
    border-radius:10px;
    text-align:center;
}

#login input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

#login button {
    padding:10px;
    width:100%;
    background:#00c6ff;
    border:none;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

.hidden { display:none; }

#panel {
    background: rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:#fff;
    color:#000;
    border-radius:10px;
    overflow:hidden;
}

th {
    background:#0072ff;
    color:#fff;
}

td, th {
    padding:10px;
    border:1px solid #ccc;
    text-align:center;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:2px;
}

button:hover {
    opacity:0.9;
}

input[type="number"] {
    width:70px;
    padding:5px;
}

.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#fff;
    color:#000;
    padding:20px;
    width:80%;
    max-height:80%;
    overflow:auto;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<div id="login">
<input id="adminId" placeholder="ID">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err" style="color:red;"></p>
</div>

<div id="panel" class="hidden">

<button onclick="logout()">Logout</button>

<button onclick="clearAll()" style="background:red; color:white; margin-bottom:10px;">
Clear All Records
</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Total</th>
<th>Answers</th>
<th>Scan</th>
<th>Marks</th>
<th>Date</th>
<th>Download</th>
<th>Delete</th>
<th>Edit</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<div class="modal" id="modal">
<div class="modal-content">
    <button onclick="closeModal()">Close</button>
    <div id="answerView"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// LOGIN
function login(){
    const user = document.getElementById("adminId").value;
    const pass = document.getElementById("adminPass").value;

    if(user==="Arabinda" && pass==="shamballa"){
        document.getElementById("login").style.display="none";
        document.getElementById("panel").classList.remove("hidden");
        load();
    } else {
        document.getElementById("err").textContent="Wrong login";
    }
}

// LOAD DATA
function load(){
    const data = JSON.parse(localStorage.getItem("examResults")) || [];
    const table = document.getElementById("data");

    table.innerHTML = "";

    data.forEach((s,index)=>{

        table.innerHTML += `
        <tr>

        <td contenteditable="true" onblur="updateField(${index}, 'name', this.innerText)">${s.name}</td>

        <td contenteditable="true" onblur="updateField(${index}, 'class', this.innerText)">${s.class}</td>

        <td>${s.total || "-"}</td>

        <td><button onclick="viewAnswers(${index})">View</button></td>

        <td>
            ${s.file ? `<a href="${s.file}" target="_blank">Open</a>` : "No File"}
        </td>

        <td>
            <input type="number" value="${s.marks || ""}" 
            onchange="saveMarks(${index}, this.value)">
        </td>

        <td>${s.date}</td>

        <td>
            <button onclick="downloadPDF(${index})">PDF</button>
            <button onclick="downloadDOC(${index})">Word</button>
        </td>

        <td>
            <button onclick="deleteRecord(${index})">Delete</button>
        </td>

        <td>
            <button onclick="editAnswers(${index})">Edit</button>
        </td>

        </tr>
        `;
    });
}

// VIEW ANSWERS
function viewAnswers(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];

    let html = `<h2>${student.name}</h2>`;
    html += `<p><b>Class:</b> ${student.class}</p>`;
    html += `<p><b>School:</b> ${student.school}</p><hr>`;

    if(student.answers){
        student.answers.forEach(a=>{
            html += `<p><b>Q${a.q}:</b> ${a.ans}</p>`;
        });
    } else {
        html += "<p>No answers found</p>";
    }

    document.getElementById("answerView").innerHTML = html;
    document.getElementById("modal").style.display = "flex";
}

// CLOSE MODAL
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// SAVE MARKS
function saveMarks(i, marks){
    let data = JSON.parse(localStorage.getItem("examResults"));
    data[i].marks = marks;
    data[i].total = marks;
    localStorage.setItem("examResults", JSON.stringify(data));
}

// UPDATE FIELD
function updateField(i, field, value){
    let data = JSON.parse(localStorage.getItem("examResults"));
    data[i][field] = value.trim();
    localStorage.setItem("examResults", JSON.stringify(data));
}

// DELETE SINGLE
function deleteRecord(i){
    if(confirm("Delete this record?")){
        let data = JSON.parse(localStorage.getItem("examResults"));
        data.splice(i,1);
        localStorage.setItem("examResults", JSON.stringify(data));
        load();
    }
}

// CLEAR ALL
function clearAll(){
    if(confirm("Delete ALL records?")){
        localStorage.removeItem("examResults");
        load();
    }
}

// EDIT ANSWERS
function editAnswers(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];

    let html = `<h2>Edit Answers - ${student.name}</h2>`;

    if(student.answers){
        student.answers.forEach((a,index)=>{
            html += `
            <p>
            Q${a.q}: 
            <textarea style="width:100%; margin-bottom:10px;"
            onchange="saveAnswer(${i}, ${index}, this.value)">${a.ans}</textarea>
            </p>`;
        });
    } else {
        html += "<p>No answers found</p>";
    }

    document.getElementById("answerView").innerHTML = html;
    document.getElementById("modal").style.display = "flex";
}

// SAVE ANSWER
function saveAnswer(studentIndex, answerIndex, value){
    let data = JSON.parse(localStorage.getItem("examResults"));
    data[studentIndex].answers[answerIndex].ans = value;
    localStorage.setItem("examResults", JSON.stringify(data));
}

// DOWNLOAD PDF
function downloadPDF(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];

    let content = `Name: ${student.name}\nClass: ${student.class}\nSchool: ${student.school}\n\n`;

    if(student.answers){
        student.answers.forEach(a=>{
            content += `Q${a.q}: ${a.ans}\n\n`;
        });
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.text(content, 10, 10);
    pdf.save(`${student.name}_Exam.pdf`);
}

// DOWNLOAD WORD
function downloadDOC(i){
    const data = JSON.parse(localStorage.getItem("examResults"));
    const student = data[i];

    let content = `Name: ${student.name}\nClass: ${student.class}\nSchool: ${student.school}\n\n`;

    if(student.answers){
        student.answers.forEach(a=>{
            content += `Q${a.q}: ${a.ans}\n\n`;
        });
    }

    const blob = new Blob([content], { type: "application/msword" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = `${student.name}_Exam.doc`;
    link.click();
}

// LOGOUT
function logout(){
    document.getElementById("panel").classList.add("hidden");
    document.getElementById("login").style.display="block";
}

</script>

</body>
</html>
